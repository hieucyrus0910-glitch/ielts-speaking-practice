<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Speaking Part 1</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'DM Sans', sans-serif; }
h1,h2,h3,.display-font { font-family:'Fraunces', serif; }
.topic-btn.active { background:#1e8e6e; color:#fff; }
.tab-btn.active { background:#fff; color:#1e8e6e; }
.quiz-option.correct { background:#d4f0e7; }
.quiz-option.wrong { background:#fff5f5; }
</style>
</head>

<body class="h-full bg-gray-50 text-gray-800">

<div id="app">

<header class="bg-white p-4 shadow flex justify-between">
<h1 class="text-xl font-bold">IELTS Speaking Part 1</h1>
<button onclick="toggleViet()" class="text-sm border px-2 py-1 rounded">🇻🇳 VI</button>
</header>

<nav id="topic-nav" class="p-3 flex gap-2"></nav>

<main id="main-content" class="p-4"></main>

</div>

<script>

// ===== DATA =====
const TOPICS = [
{
id:'hobbies',
name:'Hobbies',
questions:[
{en:"Do you like watching films?", vi:"Bạn có thích xem phim không?"}
],
vocab:[
{en:"hobby", vi:"sở thích"}
],
grammar:[
{en:"I like + V-ing", vi:"Tôi thích làm gì"}
],
exercises:[
{q:"I ___ watching films.", options:["like","likes"], answer:0}
]
}
];

// ===== STATE =====
let currentTopic = 0;
let currentTab = 0;
let showViet = true;

// ===== NAV =====
function renderNav(){
const nav = document.getElementById('topic-nav');
nav.innerHTML = TOPICS.map((t,i)=>`
<button onclick="selectTopic(${i})"
class="topic-btn px-3 py-1 border rounded">
${t.name}
</button>
`).join('');
}

// ===== SELECT =====
function selectTopic(i){
currentTopic=i;
renderContent();
}

// ===== CONTENT =====
function renderContent(){
const t = TOPICS[currentTopic];

document.getElementById('main-content').innerHTML=`

<div class="flex gap-2 mb-4">
${["Questions","Vocabulary","Grammar","Practice","Speaking"].map((tab,i)=>`
<button onclick="switchTab(${i})"
class="tab-btn px-3 py-1 border rounded ${i===0?'active':''}">
${tab}
</button>
`).join('')}
</div>

<div id="tab-panels">
${renderQuestions(t)}
</div>

`;
}

// ===== SWITCH TAB (FIXED) =====
function switchTab(i){
currentTab=i;
const t = TOPICS[currentTopic];

document.querySelectorAll('.tab-btn').forEach((b,idx)=>{
b.classList.toggle('active', idx===i);
});

const panels = document.getElementById('tab-panels');
if(!panels) return;

const renderers = [
renderQuestions,
renderVocab,
renderGrammar,
renderPractice,
renderSpeaking
];

panels.innerHTML = renderers[i](t);

// safe lucide
if(window.lucide) lucide.createIcons();
}

// ===== RENDERERS =====
function renderQuestions(t){
return t.questions.map(q=>`
<p class="mb-2">
${q.en}<br>
${showViet?`<span class="text-green-600 text-sm">${q.vi}</span>`:''}
</p>
`).join('');
}

function renderVocab(t){
return t.vocab.map(v=>`
<p>${v.en} - ${showViet?v.vi:''}</p>
`).join('');
}

function renderGrammar(t){
return t.grammar.map(g=>`
<p>${g.en} - ${showViet?g.vi:''}</p>
`).join('');
}

function renderPractice(t){
return t.exercises.map((ex,i)=>`
<div class="mb-3">
<p>${ex.q}</p>
${ex.options.map((o,oi)=>`
<button onclick="checkAnswer(${i},${oi})"
class="border px-2 py-1 mr-2 mt-1 rounded">
${o}
</button>
`).join('')}
</div>
`).join('');
}

function renderSpeaking(){
return `
<textarea class="w-full border p-2" rows="3"></textarea>
`;
}

// ===== LOGIC =====
function checkAnswer(i,oi){
const ex = TOPICS[currentTopic].exercises[i];
alert(oi===ex.answer ? "Correct!" : "Wrong!");
}

function toggleViet(){
showViet=!showViet;
renderContent();
}

// ===== INIT (FIXED) =====
document.addEventListener("DOMContentLoaded",()=>{
renderNav();
renderContent();
});

</script>

</body>
</html>
