<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Speaking Part 1</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'DM Sans', sans-serif; }
h1, h2, h3, .display-font { font-family: 'Fraunces', serif; }
.topic-btn.active { background: #1e8e6e; color: #fff; }
.quiz-option:hover { border-color: #3bae8a; background: #f0f9f6; }
.quiz-option.correct { background: #d4f0e7; }
.quiz-option.wrong { background: #fff5f5; }
.tab-btn.active { background: #fff; color: #1e8e6e; }
</style>
</head>

<body class="h-full bg-gray-50 text-gray-800">

<div id="app">

<header class="bg-white p-4 shadow">
<h1 class="text-xl font-bold">IELTS Speaking Part 1</h1>
<button onclick="toggleViet()">🇻🇳 Toggle VI</button>
</header>

<nav id="topic-nav" class="p-2 flex gap-2"></nav>

<main id="main-content" class="p-4"></main>

</div>

<script>

// ===== DATA =====
const TOPICS = [
{
id:'hobbies',
name:'Hobbies',
questions:[
{en:"Do you like watching films?", vi:"Bạn có thích xem phim không?"}
],
exercises:[
{q:"I ___ watching films.", options:["like","likes"], answer:0}
]
}
];

// ===== STATE =====
let currentTopic = 0;
let showViet = true;

// ===== RENDER NAV =====
function renderNav(){
document.getElementById('topic-nav').innerHTML =
TOPICS.map((t,i)=>`
<button onclick="selectTopic(${i})">${t.name}</button>
`).join('');
}

// ===== SELECT =====
function selectTopic(i){
currentTopic=i;
renderContent();
}

// ===== CONTENT =====
function renderContent(){
const t=TOPICS[currentTopic];

document.getElementById('main-content').innerHTML=`
<h2>${t.name}</h2>

${t.questions.map(q=>`
<p>${q.en}<br>${showViet?q.vi:''}</p>
`).join('')}

<h3>Practice</h3>

${t.exercises.map((ex,i)=>`
<p>${ex.q}</p>
${ex.options.map((o,oi)=>`
<button onclick="checkAnswer(${i},${oi})">${o}</button>
`).join('')}
`).join('')}
`;
}

// ===== CHECK =====
function checkAnswer(i,oi){
const ex=TOPICS[currentTopic].exercises[i];
if(oi===ex.answer){
alert("Correct!");
}else{
alert("Wrong!");
}
}

// ===== TOGGLE =====
function toggleViet(){
showViet=!showViet;
renderContent();
}

// ===== INIT =====
document.addEventListener("DOMContentLoaded",()=>{
renderNav();
renderContent();
});

</script>

</body>
</html>
